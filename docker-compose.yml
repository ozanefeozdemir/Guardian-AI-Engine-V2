
services:
  # 1. Redis (Message Broker)
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: always

  # 2. PostgreSQL (Database)
  postgres:
    image: "postgres:15-alpine"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=guardian_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 3. API Server (WebSocket Gateway)
  api:
    build: .
    image: guardian-backend
    working_dir: /app/backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/guardian_ai
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
      - postgres

  # 4. Analyze Engine — Simülasyon modu (CIC-IDS 2017 Wednesday + legacy RandomForest).
  #    Dashboard'a canlı veri akışını sağlayan servis budur; olmazsa paket/saldırı = 0.
  #    Simülasyon tek geçişte biter, sunumda kesintisiz akış için restart: always ile döngüler.
  #    NOT: --mode live (Scapy ile gerçek trafik) Docker içinde host arayüzü ister;
  #    canlı yakalama için lokalde: sudo python3 backend/analyze_engine.py --mode live --provider flowguard
  engine:
    build: .
    image: guardian-backend
    working_dir: /app/backend
    command: python analyze_engine.py --mode simulation --file Wednesday-workingHours.pcap_ISCX.csv --provider legacy
    restart: always
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
      - api

  # 5. Frontend UI
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata:
