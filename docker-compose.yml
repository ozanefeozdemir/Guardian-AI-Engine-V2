version: '3.8'

services:
  # 1. Veritabanı
  db:
    image: postgres:13-alpine
    container_name: guardian_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-guardian_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-guardian_pass}
      - POSTGRES_DB=${POSTGRES_DB:-guardian_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  # 2. Redis
  redis:
    image: redis:6.2-alpine
    container_name: guardian_redis
    restart: always
    ports:
      - "6379:6379"

  # 3. API - Dashboard'un beklediği servis adı tam olarak bu (api)
  api:
    build:
      context: ./Guardian/Guardian-AI-Engine-V2
    container_name: guardian_api
    working_dir: /app/backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-guardian_user}:${POSTGRES_PASSWORD:-guardian_pass}@db:5432/${POSTGRES_DB:-guardian_db}
    depends_on:
      - db
      - redis

  # 4. Analyze Engine
  engine:
    build:
      context: ./Guardian/Guardian-AI-Engine-V2
    container_name: guardian_engine
    working_dir: /app/backend
    command: python analyze_engine.py --mode simulation
    environment:
      - REDIS_URL=redis://redis:6379
    depends_on:
      - redis

  # 5. Dashboard (Asıl Panel - 5173 Portu)
  dashboard:
    build:
      context: ./Guardian/guardian-dashboard
      dockerfile: Dockerfile
    container_name: guardian_real_dashboard
    ports:
      - "5173:80"
    depends_on:
      - api # İşte bu satır yukarıdaki 'api' servisine bakıyor

  # 6. Landing (Tanıtım Sitesi - 80 Portu)
  landing:
    build:
      context: ./guardian-landing
      dockerfile: Dockerfile
    container_name: guardian_landing
    ports:
      - "80:80"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local