version: '3.8'

services:
  db:
    image: postgres:13-alpine
    container_name: guardian_db
    restart: always
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-guardian_user}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-guardian_pass}
      - POSTGRES_DB=${POSTGRES_DB:-guardian_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data/

  redis:
    image: redis:6.2-alpine
    container_name: guardian_redis
    restart: always
    ports:
      - "6379:6379"

  api:
    build:
      context: ./Guardian/Guardian-AI-Engine-V2 # Dockerfile'ın olduğu klasör burası
    container_name: guardian_api
    working_dir: /app/backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql://${POSTGRES_USER:-guardian_user}:${POSTGRES_PASSWORD:-guardian_pass}@db:5432/${POSTGRES_DB:-guardian_db}
    volumes:
      - ./Guardian/Guardian-AI-Engine-V2/backend:/app/backend # Dosya yolu güncellendi
    depends_on:
      - db
      - redis

  engine:
    build:
      context: ./Guardian/Guardian-AI-Engine-V2
    container_name: guardian_engine
    working_dir: /app/backend
    command: python analyze_engine.py --mode simulation
    environment:
      - REDIS_URL=redis://redis:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./Guardian/Guardian-AI-Engine-V2/backend:/app/backend # Dosya yolu güncellendi
    depends_on:
      - redis

  dashboard:
    build:
      context: ./guardian-landing
      dockerfile: Dockerfile
    container_name: guardian_dashboard
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  postgres_data:
    driver: local