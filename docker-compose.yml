version: '3.8'

services:
  # 1. Redis (Message Broker)
  redis:
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: always

  # 2. PostgreSQL (Database)
  postgres:
    image: "postgres:15-alpine"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=guardian_ai
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 3. API Server (WebSocket Gateway)
  api:
    build: .
    working_dir: /app/backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      - DATABASE_URL=postgresql+asyncpg://postgres:postgres@postgres:5432/guardian_ai
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
      - postgres

  # 4. Analyze Engine (Active Detector)
  engine:
    build: .
    working_dir: /app/backend
    command: python analyze_engine.py --mode live --provider guardian
    stdin_open: true
    tty: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - REDIS_URL=redis://localhost:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./model/sunum-model:/app/model/sunum-model
      - ./model/canavar-model:/app/model/canavar-model
volumes:
  pgdata:
