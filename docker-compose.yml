services:
  # 1. Redis (Message Broker)
  redis:
    container_name: guardian-redis
    image: "redis:alpine"
    ports:
      - "6379:6379"
    restart: always

  # 2. PostgreSQL (Database)
  postgres:
    container_name: guardian-postgres
    image: "postgres:15-alpine"
    ports:
      - "5432:5432"
    environment:
      - POSTGRES_USER=guardian_user
      - POSTGRES_PASSWORD=guardian_pass
      - POSTGRES_DB=guardian_db
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always

  # 3. API Server (FastAPI)
  api:
    build: .
    working_dir: /app/backend
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379
      # Burada host ismini 'postgres' yaptık çünkü yukarıdaki servis adı o
      - DATABASE_URL=postgresql+asyncpg://guardian_user:guardian_pass@postgres:5432/guardian_db
    volumes:
      - ./backend:/app/backend
    depends_on:
      - redis
      - postgres

  # 4. Analyze Engine
  engine:
    build: .
    working_dir: /app/backend
    command: python analyze_engine.py --mode live --provider flowguard
    stdin_open: true
    tty: true
    network_mode: host
    cap_add:
      - NET_ADMIN
      - NET_RAW
    environment:
      - REDIS_URL=redis://localhost:6379
      - PYTHONUNBUFFERED=1
    volumes:
      - ./backend:/app/backend
      - ./model/sunum-model:/app/model/sunum-model
      - ./model/canavar-model:/app/model/canavar-model

  # 5. Frontend UI
  frontend:
    build: ./frontend
    ports:
      - "3000:80"
    depends_on:
      - api

volumes:
  pgdata: